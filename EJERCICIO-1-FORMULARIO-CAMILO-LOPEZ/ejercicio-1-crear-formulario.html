<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREAR FORMULARIO - EJERCICIO 1</title>
</head>

<body>

    <h1>¡Regístrate y únete a la comunidad!</h1>

    <form action="#" method="post">
        
        <div>
            <label for="nombre"> Nombre: </label>
            <input type="text" id="nombre" name="nombre" required>
        </div>
        <br>
        <div>
            <label for="apellido"> Apellido: </label>
            <input type="text" id="apellido" name="apellido" required>
        </div>
        <br>
        <div>
            <label for="correo electronico"> Correo Electrónico: </label>
            <input type="email" id="correo electronico" name="correo electronico" required>
        </div>
        <br>
        <div>
            <label for="contraseña"> Contraseña: </label>
            <input type="password" id="contraseña" name="contraseña" required>
        </div>
        <br>
        <div>
            <label for="confirmar contraseña"> Confirmar contraseña: </label>
            <input type="password" id="confirmar contraseña" name="confirmar contraseña" required>
        </div>
        <br>
        <div>
            <label for="nacimiento"> Fecha de Nacimiento: </label>
            <input type="date" name="nacimiento" id="nacimiento" required>
        </div>
        <br>
        <div>
            <label>Género: </label>
            
            <input type="radio" id="Masculino" name="Género" value="Masculino">
            <label> Masculino </label>
            
            <input type="radio" id="Femenino" name="Género" value="Femenino">
            <label> Femenino </label>
            
            <input type="radio" id="Prefierio no decir" name="Género" value="Prefiero no decir">
            <label> Prefiero no decir </label>
        </div>
        <br>
        <div>
            <label> 
                <input type="checkbox" id="Boletin" name="Boletin">
                Suscribete a nuestro boletín de noticias 
            </label>
        </div>
        <br>
        <div>
            <label for="comentario"> Una descripción de mi mismo: </label>
            <br>
            <textarea id="comentario" name="comentario"></textarea> 
        </div>
        <br>
        <div>
            <label for="interes"> Selecciona tus intereses: </label>
        <br>
            <select id="interes" name="interes" multiple size="4">
                <option value="Música"> Música </option>
                <option value="Deportes"> Deportes </option>
                <option value="Viajes"> Viajes </option>
                <option value="Tecnología"> Tecnología </option>
            </select>
        </div>  
        <br>
        <br>
        <div>
            <input type="submit" value="¡Registrarse!">
        </div>

    </form>
    
</body>
</html>
